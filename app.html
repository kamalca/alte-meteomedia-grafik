/* ===============================
   WeatherPro auth + URL settings
   =============================== */

const WEATHERPRO_TOKEN_URL = "https://api.weatherpro.com/v1/token/weather";

// Cached JWT for the current page load. Refetched lazily on first use and
// after a 401/403 response from the forecast endpoint.
let weatherProToken = null;
let weatherProTokenPromise = null;

function fetchWeatherProToken(force = false) {
  if (force) {
    weatherProToken = null;
    weatherProTokenPromise = null;
  }
  if (weatherProToken) return Promise.resolve(weatherProToken);
  if (weatherProTokenPromise) return weatherProTokenPromise;
  weatherProTokenPromise = fetch(WEATHERPRO_TOKEN_URL)
    .then(r => {
      if (!r.ok) throw new Error("Token-Endpoint antwortete mit HTTP " + r.status);
      return r.text();
    })
    .then(t => {
      weatherProToken = t.trim();
      return weatherProToken;
    })
    .catch(err => {
      weatherProTokenPromise = null;
      throw err;
    });
  return weatherProTokenPromise;
}

const WEATHERPRO_FIELDS = [
  "meteoGroupStationName",
  "airTemperatureInCelsius",
  "windSpeedInKilometerPerHour",
  "windDirectionInDegree",
  "relativeHumidityInPercent",
  "maxWindGustInKilometerPerHour",
  "sunshineDurationInMinutes",
  "precipitationAmountInMillimeter"
].join(",");

function weatherProUrl(mgid) {
  const d = new Date();
  const from = new Date(d.getFullYear(), d.getMonth(), d.getDate()).toISOString();
  const until = new Date(d.getFullYear(), d.getMonth(), d.getDate() + 3, 23, 59, 59).toISOString();
  return "https://point-forecast-weatherpro.meteogroup.com/search" +
         `?fields=${WEATHERPRO_FIELDS}` +
         `&meteoGroupStationIds=${mgid}` +
         `&validPeriod=PT0S,PT1H` +
         `&validFrom=${from}` +
         `&validUntil=${until}`;
}

async function fetchWeatherProForecast(mgid) {
  const url = weatherProUrl(mgid);
  let token = await fetchWeatherProToken();
  let resp = await fetch(url, { headers: { Authorization: "Bearer " + token } });
  if (resp.status === 401 || resp.status === 403) {
    // Token may have expired — refetch once and retry.
    token = await fetchWeatherProToken(true);
    resp = await fetch(url, { headers: { Authorization: "Bearer " + token } });
  }
  if (!resp.ok) {
    throw new Error("WeatherPro antwortete mit HTTP " + resp.status);
  }
  return resp.json();
}

/* ===============================
   Load stations
   =============================== */
let allStations = [];

function changeStation(id) {
  const params = new URLSearchParams(window.location.search);
  params.set("station", id);
  history.replaceState(null, "", "?" + params.toString());
  loadStation();
}

async function loadStation() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get("station");
  if (!id) return;

  const station = METEOMEDIA_STATIONS.find(s => s.id === id);
  if (!station) {
    display_error("Diese Station ist nicht über WeatherPro verfügbar: " + id);
    return;
  }
  const mgid = station.mgid;
  const localName = station.name;

  try {
    const json = await fetchWeatherProForecast(mgid);

    if (!json.forecasts || json.forecasts.length === 0) {
      throw new Error("Keine Daten von WeatherPro erhalten");
    }

    // PT0S rows carry instantaneous values (temp, wind, dir, humidity).
    // PT1H rows carry per-hour aggregates (gust, sunshine, precipitation).
    // Both use `validFrom` as the alignment key.
    const pt0s = new Map();
    const pt1h = new Map();
    let serverName = null;
    for (const f of json.forecasts) {
      if (f.meteoGroupStationName && !serverName) serverName = f.meteoGroupStationName;
      if (f.validPeriod === "PT0S") pt0s.set(f.validFrom, f);
      else if (f.validPeriod === "PT1H") pt1h.set(f.validFrom, f);
    }

    const sortedKeys = [...pt0s.keys()].sort();
    const rows = sortedKeys.map(k => ({ pt0s: pt0s.get(k), pt1h: pt1h.get(k) }));

    parsed = {
      times: sortedKeys.map(k => new Date(k)),
      temp: rows.map(r => r.pt0s?.airTemperatureInCelsius ?? null),
      wind: rows.map(r => r.pt0s?.windSpeedInKilometerPerHour ?? null),
      gust: rows.map(r => r.pt1h?.maxWindGustInKilometerPerHour ?? null),
      sun:  rows.map(r => r.pt1h?.sunshineDurationInMinutes ?? null),
      rain: rows.map(r => r.pt1h?.precipitationAmountInMillimeter ?? null),
      rh:   rows.map(r => r.pt0s?.relativeHumidityInPercent ?? null),
      windDirSampled: rows.map((r, i) =>
        i % 2 === 0 ? (r.pt0s?.windDirectionInDegree ?? null) : null
      )
    };

    renderAll(parsed);

    document.getElementById("stationName").textContent =
      "Station: " + (serverName || localName);

  } catch (err) {
    display_error("Fehler beim Laden der WeatherPro-Daten: " + err.message);
  }
}

async function loadStationList() {
  allStations = METEOMEDIA_STATIONS
    .slice()
    .sort((a, b) => a.name.localeCompare(b.name, "de", { sensitivity: "base" }));

  renderStationOptions(allStations);

  // Set to station provided by url param
  const params = new URLSearchParams(window.location.search);
  const preset = params.get("station");
  if (preset && allStations.some(s => s.id === preset)) {
    document.getElementById("stationSelector").value = preset;
  }
}

function renderStationOptions(list) {
  const sel = document.getElementById("stationSelector");
  sel.innerHTML = '<option value="">Station wählen …</option>';

  list.forEach(s => {
    const opt = document.createElement("option");
    opt.value = s.id;
    opt.textContent = `${s.name} (${s.id})`;
    sel.appendChild(opt);
  });
}

/* ===============================
   Chart.js Plugins
   =============================== */
const gridPlugin={
  id:"grid",
  beforeDraw(c,a,o){
    const {ctx,chartArea:{top,bottom},scales:{x}}=c;
    ctx.save();
    o.hours.forEach(h=>{
      const px=x.getPixelForValue(h.i);
      ctx.strokeStyle=cssVar("--color-text-light");
      ctx.lineWidth=0.4;
      ctx.beginPath();ctx.moveTo(px,top);ctx.lineTo(px,bottom);ctx.stroke();
    });
    ctx.restore();
  },
  afterDraw(c,a,o){
    const {ctx,chartArea:{top,bottom},scales:{x}}=c;
    ctx.save();
    o.days.forEach(d=>{
      const px=x.getPixelForValue(d.i);
      ctx.strokeStyle=cssVar("--color-text");
      ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(px,top);ctx.lineTo(px,bottom);ctx.stroke();
    });
    ctx.restore();
  }
};

const zeroLinePlugin = {
  id: "zeroLine",
  afterDraw(chart) {
    const y = chart.scales.y;
    if (!y) return;

    // prüfen, ob 0°C im sichtbaren Bereich liegt
    if (y.min > 0 || y.max < 0) return;

    const y0 = y.getPixelForValue(0);
    const { left, right } = chart.chartArea;
    const ctx = chart.ctx;

    ctx.save();
    ctx.strokeStyle = cssVar("--color-text-light");
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 4]); // gestrichelt
    ctx.beginPath();
    ctx.moveTo(left, y0);
    ctx.lineTo(right, y0);
    ctx.stroke();
    ctx.restore();
  }
};

const windArrowPlugin = {
  afterDraw(chart) {
    const dirs = chart.$windDirSampled;
    if (!dirs) return;

    const { ctx, scales: { x }, chartArea } = chart;
    const y = chartArea.bottom + 6;

    ctx.save();
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = "13px system-ui";
    ctx.fillStyle = cssVar("--color-graph-winddir");

    dirs.forEach((dd, i) => {
      if (dd == null || isNaN(dd)) return;
      const px = x.getPixelForValue(i);

      ctx.save();
      ctx.translate(px, y);
      ctx.rotate((dd + 180) * Math.PI / 180);
      ctx.fillText("↑", 0, 0);
      ctx.restore();
    });
  }
};


/* ===============================
   Render
   =============================== */
function renderAll(d){
  charts.forEach(c=>c.destroy()); charts=[];
  const labels=d.times.map((_,i)=>i);
  const grid=gridInfo(d.times);

  const tMin = Math.min(...d.temp.filter(v => v != null));
  const tempScale = {beginAtZero: false};
  if (tMin < 5 && tMin >= 0) {tempScale.min = 0;}

  // Temp
  charts.push(
    new Chart(document.getElementById("cTemp"),{
      type:"line",
      plugins:[gridPlugin, zeroLinePlugin],
      data:{
        labels,
        datasets:[{
          data: d.temp,
          borderColor:cssVar("--color-graph-temp"),
          pointRadius:0,
          borderWidth:2
        }]
      },
      options:opts(grid, tempScale, false, d.times, true)
    })
  );

  // Wind
  const windChart = new Chart(document.getElementById("cWind"), {
    type: "line",
    plugins: [gridPlugin, windArrowPlugin],
    data: {
      labels,
      datasets:[
        {
          data: d.wind,
          borderColor:cssVar("--color-graph-wind"),
          pointRadius:0,
          borderWidth:2
        },
        {
          data: d.gust,
          borderColor:cssVar("--color-graph-gust"),
          borderDash:[4,3],
          pointRadius:0,
          borderWidth:2
        }
      ]
    },
    options: opts(grid, {min: 0})
  });
  windChart.$windDirSampled = d.windDirSampled;
  charts.push(windChart);

  // Humidity
  charts.push(
    new Chart(document.getElementById("cRH"),{
      type:"line",
      plugins:[gridPlugin],
      data:{
        labels,
        datasets:[{
          data: d.rh,
          borderColor:cssVar("--color-graph-humidity"),
          pointRadius:0,
          borderWidth:2
        }]
      },
      options:opts(grid)
    })
  );

  // Sun
  charts.push(
    new Chart(document.getElementById("cSun"), {
      type: "bar",
      plugins: [gridPlugin],
      data: {
        labels,
        datasets: [{
          data: d.sun,
          backgroundColor: cssVar("--color-graph-sun"),
          barPercentage: .8
        }]
      },
      options: opts(grid, {beginAtZero: false, max: 60}) // ← X-Achse an
    })
  );

  // Rain
  charts.push(
    new Chart(document.getElementById("cRain"), {
      type: "bar",
      plugins: [gridPlugin],
      data: {
        labels,
        datasets: [{
          data: d.rain,
          backgroundColor: cssVar("--color-graph-rain"),
          barPercentage: .8
        }]
      },
      options: opts(grid, {suggestedMax: 0.5}, true, d.times) // ← X-Achse an
    })
  );
}

/* ===============================
   Helper functions
   =============================== */

function opts(grid, y = {}, showX = false, times = null, showXTop = false) {
  return{
    responsive:true,
    maintainAspectRatio:false,
    plugins:{legend:{display:false},grid:{days:grid.days,hours:grid.hours}},
    scales: {
      x: {
        display: showX,
        ticks: showX && times ? {
          autoSkip: false,
          callback: (value) => hourLabel(times, value),
          maxRotation: 0,
          minRotation: 0,
          font: { size: cssVar("--font-size-small") },
          color: cssVar("--color-text-light")
        } : undefined,
        grid: { display: false }
      },
      xTop: {
        position: "top",
        display: showXTop,
        ticks: showXTop && times ? {
          autoSkip: false,
          callback: (v) => dayTicks(times)[v],
          maxRotation: 0,
          minRotation: 0,
          font: { size: cssVar("--font-size"), weight: "bold" },
          color: cssVar("--color-text"),
          padding: 4
        } : undefined,
        grid: { display: false }
      },
      y: {
        afterFit(scale) {
          scale.width = 28;
        },
        grid: {
          color: cssVar("--color-text-light"),
          lineWidth: 0.1
        },
        ...y
      }
    }
  };
}

function hourLabel(times, index) {
  const h = times[index].getHours();
  return [0, 6, 12, 18].includes(h)
    ? h.toString().padStart(2, "0")
    : "";
}

function dayTicks(times) {
  return times.map((t, i) =>
    t.getHours() === 12
      ? t.toLocaleDateString("de-DE", {
          weekday: "short",
          day: "2-digit",
          month: "2-digit"
        })
      : ""
  );
}

function cssVar(name) {
  return getComputedStyle(document.documentElement)
    .getPropertyValue(name)
    .trim();
}

function gridInfo(times){
  const days=[],hours=[];
  times.forEach((t,i)=>{
    if(t.getHours()===0) days.push({i,t});
    if([0,6,12,18].includes(t.getHours())) hours.push({i});
  });
  return {days,hours};
}

function display_error(message) {
  let e = document.getElementById("error");
  e.textContent = message;
  e.style.display = "block";
}

function changeDarkmode(value) {
  localStorage.setItem("darkmode", value);
  window.location = '';
}

function setDarkmodeFromStorage() {
  const mode = localStorage.getItem("darkmode") ?? 2;
  const root = document.documentElement;

  document.getElementById("darkmodeSelector").value = mode;

  if (mode === "1") {
    root.dataset.theme = "dark";
  } else if (mode === "3") {
    root.dataset.theme = "meteomedia";
  } else if (mode === "0") {
    delete root.dataset.theme;
  } else {
    if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
      root.dataset.theme = "dark";
    } else {
      delete root.dataset.theme;
    }
  }
}

/* ===============================
   Init
   =============================== */
let charts=[];
document.getElementById("stationSearch").addEventListener("input", e => {
  const q = e.target.value.trim().toLowerCase();

  const filtered = allStations.filter(s =>
    s.name.toLowerCase().includes(q) ||
    s.id.includes(q)
  );

  renderStationOptions(filtered);
});
loadStationList().then(loadStation);
setDarkmodeFromStorage();
